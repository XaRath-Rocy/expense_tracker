{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-7">

    <div class="card">
      <div class="card-header fw-semibold fs-5">
        <i class="bi bi-plus-circle"></i> Add New Expense
      </div>
      <div class="card-body p-4">
        <form method="POST">

          <div class="mb-3">
            <label class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
            <input type="text" name="title" class="form-control"
                   placeholder="e.g. Lunch, Bus ticket, Electricity bill" required/>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Amount (₹) <span class="text-danger">*</span></label>
              <input type="number" name="amount" class="form-control"
                     placeholder="0.00" step="0.01" min="0.01" required/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Category <span class="text-danger">*</span></label>
              <select name="category" class="form-select">
                {% for cat in categories %}
                <option value="{{ cat }}">{{ cat }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Date <span class="text-danger">*</span></label>
            <input type="date" name="date" class="form-control" value="{{ today }}" required/>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Note <span class="text-muted small">(optional)</span></label>
            <textarea name="note" class="form-control" rows="2"
                      placeholder="Any extra details..."></textarea>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-circle"></i> Save Expense
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>

{% endblock %}
