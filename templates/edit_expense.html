{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-7">

    <div class="card">
      <div class="card-header fw-semibold fs-5">
        <i class="bi bi-pencil-square"></i> Edit Expense
      </div>
      <div class="card-body p-4">
        <form method="POST">

          <div class="mb-3">
            <label class="form-label fw-semibold">Title</label>
            <input type="text" name="title" class="form-control"
                   value="{{ expense['title'] }}" required/>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Amount (₹)</label>
              <input type="number" name="amount" class="form-control"
                     value="{{ expense['amount'] }}" step="0.01" min="0.01" required/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Category</label>
              <select name="category" class="form-select">
                {% for cat in categories %}
                <option value="{{ cat }}" {% if cat == expense['category'] %}selected{% endif %}>{{ cat }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Date</label>
            <input type="date" name="date" class="form-control"
                   value="{{ expense['date'] }}" required/>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Note</label>
            <textarea name="note" class="form-control" rows="2">{{ expense['note'] or '' }}</textarea>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">
              <i class="bi bi-save"></i> Update Expense
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>

{% endblock %}
